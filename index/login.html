<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · RantBox</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="login-style.css"/>
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="logo">RantBox</div>
      <p>The dark corner of the internet. Say anything.</p>
    </div>
    <div class="auth-card">
      <h2>Welcome back</h2>
      <div class="auth-err" id="err"></div>
      <form id="form" novalidate>
        <div class="field">
          <label for="u">Username</label>
          <input id="u" type="text" placeholder="your_username" autocomplete="username"/>
        </div>
        <div class="field">
          <label for="p">Password</label>
          <div class="pw-wrap">
            <input id="p" type="password" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="pw-eye" data-target="p" tabindex="-1">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-submit" id="btn">Log in</button>
      </form>
      <div class="or-div">or</div>
      <div class="auth-foot">No account? <a href="signup.html">Create one</a></div>
    </div>
  </div>
  <script src="storage.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="login-logic.js"></script>
  <script>
    document.querySelectorAll('.pw-eye').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById(btn.dataset.target);
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.querySelector('.eye-icon').style.display     = show ? 'none' : '';
        btn.querySelector('.eye-off-icon').style.display = show ? '' : 'none';
      });
    });
  </script>
</body>
</html>
